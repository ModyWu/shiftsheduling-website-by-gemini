<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兼職抽籤系統</title>
    <!-- 載入 React 核心 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- 載入 Babel 編譯器 (讓瀏覽器看的懂 React 語法) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 載入 Tailwind CSS (處理畫面樣式) -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- 替換原本的 Lucide 圖示為內聯 SVG ---
        const IconCalendar = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
        const IconShieldCheck = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><path d="m9 12 2 2 4-4"></path></svg>;
        const IconPlay = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
        const IconAlertCircle = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;
        const IconCheckCircle = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
        const IconRefreshCcw = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>;
        const IconClock = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const IconUsers = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>;

        function App() {
            const [datesInput, setDatesInput] = useState('1, 5, 12, 18, 25');
            const [employeesInput, setEmployeesInput] = useState('王小明\n李大華\n張阿寶\n陳美麗\n林快樂\n周星\n吳寶春');
            const [nPerDay, setNPerDay] = useState(2);
            const [guaranteeInput, setGuaranteeInput] = useState('');
            
            const [results, setResults] = useState([]);
            const [finalGuarantee, setFinalGuarantee] = useState([]);
            const [drawLogs, setDrawLogs] = useState([]);
            const [error, setError] = useState('');

            // Fisher-Yates 洗牌演算法
            const shuffleArray = (array) => {
                const arr = [...array];
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            };

            const handleGenerate = () => {
                setError('');
                
                // 1. 解析與驗證輸入
                const rawDates = datesInput.split(/[\s,，、]+/).map(d => parseInt(d, 10)).filter(d => !isNaN(d));
                const uniqueDates = [...new Set(rawDates)];
                
                const employees = employeesInput.split('\n').map(e => e.trim()).filter(e => e);
                const initialGuarantee = guaranteeInput.split('\n').map(e => e.trim()).filter(e => e && employees.includes(e));

                if (uniqueDates.length === 0) return setError('請至少輸入一個有效的日期。');
                if (employees.length === 0) return setError('請至少輸入一名員工。');
                if (nPerDay <= 0) return setError('每日上班人數必須大於 0。');
                if (nPerDay > employees.length) return setError(`每日上班人數 (${nPerDay}) 不能大於總員工數 (${employees.length})。`);

                const logs = [];
                const schedule = [];
                
                // 2. 亂數排序日期
                const shuffledDates = shuffleArray(uniqueDates);
                logs.push(`【初始化】系統已將需抽籤的日期亂數打亂：${shuffledDates.join(' -> ')}`);

                // 3. 準備抽籤池
                let currentGuaranteePool = [...initialGuarantee];
                if (currentGuaranteePool.length === 0) {
                    logs.push('【初始化】沒有輸入上月保底名單，首次抽籤將從「全體員工」中抽取。');
                    currentGuaranteePool = [...employees];
                } else {
                    logs.push(`【初始化】已載入上月保底名單：${currentGuaranteePool.join(', ')}`);
                }

                // 4. 開始每一天的抽籤
                shuffledDates.forEach((date) => {
                    logs.push(`--- 開始抽取 ${date} 號的班表 ---`);
                    const workersToday = [];
                    
                    while (workersToday.length < nPerDay) {
                        const availableInPool = currentGuaranteePool.filter(emp => !workersToday.includes(emp));
                        
                        if (availableInPool.length > 0) {
                            const pickIndex = Math.floor(Math.random() * availableInPool.length);
                            const picked = availableInPool[pickIndex];
                            
                            workersToday.push(picked);
                            logs.push(`[${date}號] 從保底名單中抽出：${picked}`);
                            currentGuaranteePool = currentGuaranteePool.filter(emp => emp !== picked);
                        } else {
                            logs.push(`[${date}號] ⚠️ 保底名單已耗盡(或剩餘人員已排班)，將【全體員工】重新加入抽籤池！`);
                            currentGuaranteePool = [...employees];
                        }
                    }

                    // 結算這回合 (正確保留重置前沒被抽到的人)
                    logs.push(`[${date}號結算] 本輪沒中人員進入保底名單：${currentGuaranteePool.length > 0 ? currentGuaranteePool.join(', ') : '無'}`);
                    schedule.push({ date, workers: workersToday });
                });

                // 5. 儲存結果
                setResults(schedule);
                setFinalGuarantee(currentGuaranteePool);
                setDrawLogs(logs);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 font-sans text-slate-800">
                    <div className="max-w-6xl mx-auto space-y-6">
                        
                        {/* Header */}
                        <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 flex items-center space-x-4">
                            <div className="bg-indigo-600 p-3 rounded-xl">
                                <IconCalendar className="w-8 h-8 text-white" />
                            </div>
                            <div>
                                <h1 className="text-2xl font-bold text-slate-900"兼職抽籤系統</h1>
                                <p className="text-slate-500 text-sm mt-1">結合亂數日期與保底優先機制的公平排班工具</p>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            
                            {/* Left Column: Inputs */}
                            <div className="lg:col-span-4 space-y-6">
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                                    <h2 className="text-lg font-bold mb-4 flex items-center text-slate-800">
                                        <IconShieldCheck className="w-5 h-5 mr-2 text-indigo-500" />
                                        設定抽籤條件
                                    </h2>
                                    
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">需抽籤日期</label>
                                            <p className="text-xs text-slate-400 mb-2">可輸入如: 1, 5, 12, 25</p>
                                            <textarea className="w-full border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none resize-none" rows="2" value={datesInput} onChange={(e) => setDatesInput(e.target.value)} placeholder="例如: 1, 2, 3, 4, 5" />
                                        </div>

                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">員工名單 (總池)</label>
                                            <textarea className="w-full border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none resize-none" rows="6" value={employeesInput} onChange={(e) => setEmployeesInput(e.target.value)} placeholder="王小明&#10;李大華..." />
                                        </div>

                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">每日上班人數 (n名)</label>
                                            <input type="number" min="1" className="w-full border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" value={nPerDay} onChange={(e) => setNPerDay(parseInt(e.target.value) || 0)} />
                                        </div>

                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">上月剩餘保底名單 (選填)</label>
                                            <textarea className="w-full border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none resize-none bg-indigo-50/50" rows="3" value={guaranteeInput} onChange={(e) => setGuaranteeInput(e.target.value)} placeholder="若無可留空..." />
                                        </div>

                                        {error && (
                                            <div className="bg-red-50 text-red-600 p-3 rounded-lg text-sm flex items-start">
                                                <IconAlertCircle className="w-4 h-4 mr-2 mt-0.5 flex-shrink-0" />
                                                <span>{error}</span>
                                            </div>
                                        )}

                                        <button onClick={handleGenerate} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-4 rounded-xl shadow-sm transition-colors flex items-center justify-center">
                                            <IconPlay className="w-4 h-4 mr-2" />
                                            開始執行抽籤
                                        </button>
                                    </div>
                                </div>
                            </div>

                            {/* Right Column: Results */}
                            <div className="lg:col-span-8 space-y-6">
                                {results.length > 0 ? (
                                    <>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                                                <h2 className="text-lg font-bold mb-4 flex items-center text-slate-800">
                                                    <IconCheckCircle className="w-5 h-5 mr-2 text-emerald-500" />
                                                    排班結果 (已依日期排序)
                                                </h2>
                                                <div className="space-y-3">
                                                    {[...results].sort((a, b) => a.date - b.date).map((item, idx) => (
                                                        <div key={idx} className="flex flex-col sm:flex-row sm:items-center justify-between p-3 bg-slate-50 border border-slate-100 rounded-xl">
                                                            <div className="flex items-center mb-2 sm:mb-0">
                                                                <span className="bg-indigo-100 text-indigo-700 font-bold w-10 h-10 rounded-lg flex items-center justify-center mr-3 shrink-0">{item.date}</span>
                                                                <span className="text-sm font-medium text-slate-500">號</span>
                                                            </div>
                                                            <div className="flex flex-wrap gap-2 justify-end">
                                                                {item.workers.map((worker, wIdx) => (
                                                                    <span key={wIdx} className="bg-white border border-slate-200 text-slate-700 px-3 py-1 rounded-full text-sm font-medium shadow-sm">{worker}</span>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col">
                                                <h2 className="text-lg font-bold mb-4 flex items-center text-slate-800">
                                                    <IconRefreshCcw className="w-5 h-5 mr-2 text-amber-500" />
                                                    剩餘保底名單 (供下月使用)
                                                </h2>
                                                <div className="flex-grow bg-amber-50/50 border border-amber-100 rounded-xl p-4">
                                                    {finalGuarantee.length > 0 ? (
                                                        <div className="space-y-2">
                                                            <p className="text-xs text-amber-700/70 mb-3 border-b border-amber-200 pb-2">以下人員下個月將享有優先排班權：</p>
                                                            <div className="flex flex-wrap gap-2">
                                                                {finalGuarantee.map((worker, idx) => (
                                                                    <span key={idx} className="bg-amber-100 text-amber-800 px-3 py-1.5 rounded-lg text-sm font-medium">{worker}</span>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    ) : (
                                                        <div className="flex flex-col items-center justify-center h-full text-slate-400 py-8">
                                                            <p className="text-sm">所有人皆已排班，無剩餘保底名單。</p>
                                                        </div>
                                                    )}
                                                </div>
                                                
                                                {finalGuarantee.length > 0 && (
                                                    <div className="mt-4">
                                                        <label className="text-xs text-slate-500 block mb-1">方便複製區：</label>
                                                        <textarea readOnly className="w-full text-xs bg-slate-50 border border-slate-200 rounded p-2 outline-none h-20 text-slate-600" value={finalGuarantee.join('\n')} />
                                                    </div>
                                                )}
                                            </div>
                                        </div>

                                        <div className="bg-slate-900 rounded-2xl shadow-sm p-6 text-slate-300 font-mono text-sm">
                                            <h2 className="text-lg font-bold mb-4 flex items-center text-white font-sans">
                                                <IconClock className="w-5 h-5 mr-2 text-slate-400" />
                                                系統抽籤歷程紀錄 (防算班證明)
                                            </h2>
                                            <div className="h-64 overflow-y-auto space-y-2 pr-2">
                                                {drawLogs.map((log, idx) => (
                                                    <div key={idx} className={`${log.includes('---') ? 'text-indigo-400 mt-4 mb-2 font-bold' : log.includes('⚠️') ? 'text-amber-400' : 'text-slate-400'}`}>
                                                        {log}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </>
                                ) : (
                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-12 flex flex-col items-center justify-center text-center h-full min-h-[400px]">
                                        <div className="bg-indigo-50 w-20 h-20 rounded-full flex items-center justify-center mb-4">
                                            <IconUsers className="w-10 h-10 text-indigo-300" />
                                        </div>
                                        <h3 className="text-lg font-bold text-slate-700 mb-2">尚未產生班表</h3>
                                        <p className="text-slate-500 text-sm max-w-sm">
                                            請在左側輸入日期、員工名單及每日需求人數，點擊「開始執行抽籤」即可自動產生公平的排班結果。
                                        </p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
